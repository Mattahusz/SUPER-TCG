<!DOCTYPE html>
<html>
  
<head>

 <style>
   /*CSS*/
  /*EFEITOS*/   
.card{

  width:260px;
  overflow:ridden;

}

.card img{

  width:100%;
  height:auto;

  display:block;

  border-radius:20px;

}
   
}
   .electric{

  box-shadow:0 0 20px cyan;

   }
   
 .fire{

  box-shadow:0 0 50px red;
   
   }

   /* SHINE METÁLICO */

.card::after{

  content:'';

  position:absolute;

  top:-50%;
  left:-60%;

  width:40%;
  height:220%;

  background:
  rgba(255,255,255,0.35);

  transform:rotate(25deg);

  animation:metalShine 5s infinite;

}

  @keyframes metalShine{

  from{
    left:-60%;
  }

  to{
    left:130%;
  }

  }
   /* PARTÍCULAS */

.particles{

  position:absolute;

  inset:0;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,0.5) 1px,
      transparent 2px
    );

  background-size:30px 30px;

  opacity:0.25;

  animation:particlesMove 6s linear infinite;

  pointer-events:none;
  }
   /* AURA SUAVE */

.electric::before{

  content:'';

  position:absolute;

  inset:-8px;

  border-radius:25px;

  z-index:-1;

  background:
  linear-gradient(
    45deg,
    rgba(0,195,255,0.25),
    rgba(0,68,255,0.15),
    rgba(125,249,255,0.20)
  );

  filter:blur(12px);

  animation:electricAura 5s linear infinite;
}
   @keyframes particlesMove{

  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(-25px);
  }

   }
    
</style>
  
</head>

<body>
  <!--CARTAS-->
<div class="card fire">
  
  <img src="michel.webp">
  
    </div>  
  
</body>

</html>
