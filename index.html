<!DOCTYPE html>
<html>
  
<head>

 <style>
   /*CSS*/
  /*EFEITOS*/   
.card{

  width:260px;
  border-radius:20px;
  overflow:hidden;
  position:relative;

}
   .electric{

  box-shadow:0 0 20px cyan;

   }
   
 .fire{

  box-shadow:0 0 20px red;

 }  
/* SHINE METÁLICO */

.card::after{

  content:'';

  position:absolute;

  top:-50%;
  left:-60%;

  width:40%;
  height:220%;

  background:
  rgba(255,255,255,0.35);

  transform:rotate(25deg);

  animation:metalShine 3s infinite;

}
   @keyframes metalShine{

  from{
    left:-60%;
  }

  to{
    left:130%;
  }

   }
    
</style>
  
</head>

<body>
  <!--CARTAS-->
<div class="card fire">
  <img src="bachira_8.webp">
    </div>
  
</body>

</html>
