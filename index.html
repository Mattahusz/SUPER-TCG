<!DOCTYPE html>
<html>
  
<head>

 <style>
   /*CSS*/
/*RARIDADES*/

   /* LEGENDARY */

.legendary{

  border:3px solid rgba(255,80,0,0.95);

  box-shadow:

    0 0 8px rgba(255,0,0,1),

    0 0 20px rgba(255,60,0,0.95),

    0 0 40px rgba(255,120,0,0.8),

    0 0 70px rgba(255,140,0,0.5);

}
   .legendary::before{

  content:'';

  position:absolute;

  inset:-3px;

  border-radius:24px;

  z-index:-1;

  background:

  linear-gradient(

    45deg,

    #ff0000,

    #ff2200,

    #ff5500,

    #ff8800,

    #ff3300,

    #ff0000

  );

  background-size:400%;

  animation:legendaryBorder 5s linear infinite;

  filter:blur(4px);
   }

   animation:legendaryPulse 2s infinite alternate;
   
@keyframes legendaryPulse{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.02);
  }

}
   @keyframes legendaryBorder{

  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:400% 50%;
  }

                  }

    
   body{
     background:black;

     /* ESPESSURA */

.card::before{

  content:'';

  position:absolute;

  top:12px;
  left:-12px;

  width:100%;
  height:100%;

  border-radius:22px;

  background:
  rgba(255,255,255,0.08);

  z-index:-1;

  filter:blur(8px);

}

     .card{

  box-shadow:

    0 10px 25px rgba(0,0,0,0.5),

    0 20px 40px rgba(0,0,0,0.35);

}

     .card:hover{

  transform:

    rotateY(15deg)
    rotateX(8deg)
    translateY(-10px)

    scale(1.03);

}
     
   }
  /*EFEITOS*/

   /*BORDAS PRIME*/
   .prime::before{

  content:'';

  position:absolute;

  inset:-8px;

  border-radius:25px;

  z-index:-1;

  background:
  linear-gradient(
    45deg,

    rgba(255,255,255,0.25),

    rgba(255,255,255,0.08),

    rgba(255,215,0,0.18)
  );

  filter:blur(12px);

}
   
   /* CARTA PRO */
   .pro{

  position:relative;

  border-radius:22px;

  overflow:hidden;

  background:
  rgba(255,255,255,1);

  backdrop-filter:blur(20px);

  box-shadow:
    0 0 60px gold,
    0 0 40px rgba(255,215,0,0.8);

  }

.prime{

  position:relative;

  border-radius:80px;

  overflow:hidden;

  box-shadow:
    0 0 12px rgba(255,215,0,0.6),
    0 0 30px rgba(255,230,120,0.8);
  
background: rgba(255,255,255,1);

  backdrop-filter: blur(20px);

  border-radius:20px;

}
}

/* BORDA DIAMANTE */

.card::before{

  content:'';

  position:absolute;

  inset:-3px;

  border-radius:20px;

  z-index:-1;

  background:
    linear-gradient(
      45deg,
      #fff8cc,
      #ffd700,
      #fff4a3,
      #ffec8b,
      #ffffff,
      #ffd700
    );

  background-size:400%;

  filter:blur(20px);

  animation:diamondBorder 6s linear infinite;
}

   /* REFLEXO */

.card::after{

  content:'';

  position:absolute;

  top:-50%;
  left:-80%;

  width:35%;
  height:220%;

  background:
    rgba(255,255,255,0.8);

  transform:rotate(25deg);

  filter:blur(20px);

  animation:goldShine 3s infinite;
  }

   @keyframes goldShine{

  from{
    left:-80%;
  }

  to{
    left:160%;
  }

}

/* BORDA */

@keyframes diamondBorder{

  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:400% 50%;
  }

}

   
.card{

  width:260px;
  position:relative;
  oveflow:hidden;
  backdrop-filter:blur(20px);
}

.card img{

  width:100%;
  height:auto;

  display:block;

  border-radius:20px;
  position:relative;
  oveflow:hidden;
  backdrop-filter:blur(20px);
  

}
   
}
   .epic{

  box-shadow:0 0 80px  purple;

   }
   
 .fire{

  box-shadow:0 0 80px red;
   
   }
  
   /* AURA SUAVE */

.prime::before{

  content:'';

  position:absolute;

  inset:-8px;

  border-radius:25px;

  z-index:-1;

  background:
  linear-gradient(
    45deg,
    rgba(0,195,255,0.25),
    rgba(0,68,255,0.15),
    rgba(125,249,255,0.20)
  );

  filter:blur(20px);

  animation:primeAura 5s linear infinite;
}
   
</style>
  
</head>

<body>
  <!--CARTAS-->

  <div class="card legendary prime ">

   <img src="bachira.webp">
    
   
  </div>

  <div class="card legendary prime">

    <img src="bachira_prime.webp">
    
    
  </div>

  <div class="card pro">

    <img src="bachira_gold.webp">

  </div>
  
</body>

</html>
