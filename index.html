<!DOCTYPE html>
<html>
  
<head>

 <style>
   /*CSS*/
  /*EFEITOS*/   
.card{

  width:260px;
  border-radius:8px;
  overflow:hidden;
  position:relative;

}
   .electric{

  box-shadow:0 0 20px cyan;

   }
   
 .fire{

  box-shadow:0 0 20px red;

 }  
/* SHINE METÁLICO */

.card::after{

  content:'';

  position:absolute;

  top:-50%;
  left:-60%;

  width:40%;
  height:220%;

  background:
  rgba(255,255,255,0.35);

  transform:rotate(25deg);

  animation:metalShine 3s infinite;

}

   body{
     background:blue;
   }
    
</style>
  
</head>

<body>
  <!--CARTAS-->
<div class="card electric">
  <img src="kaiser_10.webp">
    
   </div>
  
</body>

</html>
