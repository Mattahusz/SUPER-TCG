<!DOCTYPE html>
<html>

<head>

<style>

 .card::after{
  content:"";
  position:absolute;
  inset:-20px;

  background:
    radial-gradient(circle, rgba(0,200,255,0.8) 2px, transparent 3px),
    radial-gradient(circle, rgba(0,100,255,0.6) 1px, transparent 2px);

  background-size: 40px 40px, 60px 60px;

  animation:particulas 4s linear infinite;

  opacity:0.6;
  pointer-events:none;
 }   

 @keyframes particulas{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(-40px);
  }
 }   

body{
    margin:0;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;

    background:
    radial-gradient(circle at center, #111 0%, #000 100%);

    overflow:hidden;

    perspective:1000px;
}

/* FUNDO ELÉTRICO */

body::before{

    content:'';

    position:absolute;

    width:200%;
    height:200%;

    background:
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 80px,
        rgba(0,180,255,0.04) 82px
    );

    animation:fundoMove 8s linear infinite;
}

/* CARTA */

.card{

    position:relative;

    width:260px;

    border-radius:22px;

    overflow:hidden;

    cursor:pointer;

    transition:0.5s;

    transform-style:preserve-3d;

    animation:pulse 2s infinite;

}

/* IMAGEM */

.card img{

    width:100%;

    display:block;

    border-radius:22px;

}

/* AURA AZUL */

.card::before{

    content:'';

    position:absolute;

    inset:-5px;

    border-radius:25px;

    z-index:-1;

    background:
    linear-gradient(
        45deg,
        #00c3ff,
        #0044ff,
        #7df9ff,
        #001eff,
        #00c3ff
    );

    background-size:400%;

    filter:blur(18px);

    animation:
      aura 5s linear infinite,
      raio 0.15s infinite;

}

/* BRILHO METÁLICO */

.card::after{

    content:'';

    position:absolute;

    top:-60%;
    left:-80%;

    width:40%;
    height:220%;

    background:
    rgba(255,255,255,0.35);

    transform:rotate(25deg);

    animation:metal 3s infinite;
}

/* HOVER 3D */

.card:hover{

    transform:
      rotateY(18deg)
      rotateX(8deg)
      scale(1.05);

}

/* PULSAÇÃO */

@keyframes pulse{

    0%{

        box-shadow:
          0 0 15px #00c3ff,
          0 0 40px #0044ff;

    }

    50%{

        box-shadow:
          0 0 35px #7df9ff,
          0 0 90px #005eff;

    }

    100%{

        box-shadow:
          0 0 15px #00c3ff,
          0 0 40px #0044ff;

    }

}

/* AURA */

@keyframes aura{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:400% 50%;
    }

}

/* REFLEXO METÁLICO */

@keyframes metal{

    from{
        left:-80%;
    }

    to{
        left:150%;
    }

}

/* MOVIMENTO DO FUNDO */

@keyframes fundoMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(120px);
    }

}

/* EFEITO DE RAIO */

@keyframes raio{

    0%{
        opacity:1;
    }

    10%{
        opacity:0.7;
    }

    20%{
        opacity:1;
    }

    30%{
        opacity:0.8;
    }

    40%{
        opacity:1;
    }

    100%{
        opacity:1;
    }

     }
 
body{
 background:#111;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 perspective:1000px;
}

.card{
 width:250px;
 border-radius:20px;

 box-shadow:
   0 0 15px gold,
   0 0 40px orange,
   0 0 80px yellow;

 transition:0.6s;

 cursor:pointer;

 animation:pulse 2s infinite;
}

.card:hover{
 transform:
   rotateY(15deg)
   rotateX(5deg)
   scale(1.05);
}

@keyframes pulse{

 0%{
   box-shadow:
     0 0 10px gold,
     0 0 30px orange;
 }

 50%{
   box-shadow:
     0 0 25px yellow,
     0 0 60px orange;
 }

 100%{
   box-shadow:
     0 0 10px gold,
     0 0 30px orange;
 }

}

</style>

</head>

<body>

<img
 class="card"
 src="itoshi_sae.webp"
>

</body>

</html>
