<!DOCTYPE html>
<html>
  
<head>

 <style>
   /*CSS*/

   body{
     background:black;
   }
  /*EFEITOS*/   
   /* CARTA PRO */
   .pro{

  position:relative;

  border-radius:22px;

  overflow:hidden;

  background:
  rgba(255,255,255,0.08);

  backdrop-filter:blur(1px);

  box-shadow:
    0 0 15px gold,
    0 0 40px rgba(255,215,0,0.5);

  }

.prime{

  position:relative;

  border-radius:22px;

  overflow:hidden;

  box-shadow:
    0 0 12px rgba(255,215,0,0.6),
    0 0 30px rgba(255,230,120,0.4);
  
background: rgba(255,255,255,0.08);

  backdrop-filter: blur(1px);

  border-radius:20px;

}
}

/* BORDA DIAMANTE */

.prime::before{

  content:'';

  position:absolute;

  inset:-3px;

  border-radius:24px;

  z-index:-1;

  background:
    linear-gradient(
      45deg,
      #fff8cc,
      #ffd700,
      #fff4a3,
      #ffec8b,
      #ffffff,
      #ffd700
    );

  background-size:400%;

  filter:blur(1px);

  animation:diamondBorder 6s linear infinite;
}

   /* REFLEXO */

.prime::after{

  content:'';

  position:absolute;

  top:-50%;
  left:-80%;

  width:35%;
  height:220%;

  background:
    rgba(255,255,255,0.35);

  transform:rotate(25deg);

  filter:blur(1px);

  animation:goldShine 3s infinite;
  }

   @keyframes goldShine{

  from{
    left:-80%;
  }

  to{
    left:160%;
  }

}

/* BORDA */

@keyframes diamondBorder{

  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:400% 50%;
  }

}

   
.card{

  width:260px;
}

.card img{

  width:100%;
  height:auto;

  display:block;

  border-radius:20px;

}
   
}
   .electric{

  box-shadow:0 0 20px  purple;

   }
   
 .fire{

  box-shadow:0 0 80px red;
   
   }
   /* PARTÍCULAS */

.particles{

  position:absolute;

  inset:0;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,0.8) 1px,
      transparent 2px
    );

  background-size:30px 30px;

  opacity:0.25;

  animation:particlesMove 6s linear infinite;

  pointer-events:none;
  }
   /* AURA SUAVE */

.electric::before{

  content:'';

  position:absolute;

  inset:-8px;

  border-radius:25px;

  z-index:-1;

  background:
  linear-gradient(
    45deg,
    rgba(0,195,255,0.25),
    rgba(0,68,255,0.15),
    rgba(125,249,255,0.20)
  );

  filter:blur(4px);

  animation:electricAura 5s linear infinite;
}
   @keyframes particlesMove{

  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(-25px);
  }

   }
    
</style>
  
</head>

<body>
  <!--CARTAS-->

  <div class="card prime">

   <img src="bachira.webp">

  </div>

  <div class="card prime">

    <img src="bachira_prime.webp">

  </div>

  <div class="card pro">

    <img src="bachira_gold.webp">

  </div>
  
</body>

</html>
