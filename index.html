<!DOCTYPE html>
<html>
  
<head>

 <style>
   /*CSS*/

   body{
     background:black;

     /* ESPESSURA */

.card::before{

  content:'';

  position:absolute;

  top:12px;
  left:-12px;

  width:100%;
  height:100%;

  border-radius:22px;

  background:
  rgba(255,255,255,0.08);

  z-index:-1;

  filter:blur(2px);

}

     .card{

  box-shadow:

    0 10px 25px rgba(0,0,0,0.5),

    0 20px 40px rgba(0,0,0,0.35);

}

     .card:hover{

  transform:

    rotateY(15deg)
    rotateX(8deg)
    translateY(-10px)

    scale(1.03);

}
     
   }
  /*EFEITOS*/   
   /* SHINE DE VIDRO */

.card::after{

  content:'';

  position:relative;
  overflow:hidden;
  
  inset:0;

  border-radius:8px;

  background:

  linear-gradient(

    120deg,

    rgba(255,255,255,0.00) 20%,

    rgba(255,255,255,0.10) 40%,

    rgba(255,255,255,0.35) 50%,

    rgba(255,255,255,0.08) 60%,

    rgba(255,255,255,0.00) 80%

  );

  mix-blend-mode:screen;

  animation:glassShine 4s linear infinite;

  pointer-events:none;
}

   @keyframes glassShine{

  from{
    transform:translateX(-120%);
  }

  to{
    transform:translateX(120%);
  }

}

   
.prime{

  box-shadow:

    0 0 10px rgba(255,255,255,1),

    0 0 25px rgba(255,255,255,0.8),

    0 0 40px rgba(255,215,0,0.5);

}

   /*BORDAS PRIME*/
   .prime::before{

  content:'';

  position:absolute;

  inset:-8px;

  border-radius:25px;

  z-index:-1;

  background:
  linear-gradient(
    45deg,

    rgba(255,255,255,0.25),

    rgba(255,255,255,0.08),

    rgba(255,215,0,0.18)
  );

  filter:blur(12px);

}
   
   /* CARTA PRO */
   .pro{

  position:relative;

  border-radius:22px;

  overflow:hidden;

  background:
  rgba(255,255,255,1);

  backdrop-filter:blur(20px);

  box-shadow:
    0 0 60px gold,
    0 0 40px rgba(255,215,0,0.8);

  }

.prime{

  position:relative;

  border-radius:60px;

  overflow:hidden;

  box-shadow:
    0 0 12px rgba(255,215,0,0.6),
    0 0 30px rgba(255,230,120,0.8);
  
background: rgba(255,255,255,1);

  backdrop-filter: blur(20px);

  border-radius:20px;

}
}

/* BORDA DIAMANTE */

.card::before{

  content:'';

  position:absolute;

  inset:-3px;

  border-radius:20px;

  z-index:-1;

  background:
    linear-gradient(
      45deg,
      #fff8cc,
      #ffd700,
      #fff4a3,
      #ffec8b,
      #ffffff,
      #ffd700
    );

  background-size:400%;

  filter:blur(20px);

  animation:diamondBorder 6s linear infinite;
}

   /* REFLEXO */

.card::after{

  content:'';

  position:absolute;

  top:-50%;
  left:-80%;

  width:35%;
  height:220%;

  background:
    rgba(255,255,255,0.8);

  transform:rotate(25deg);

  filter:blur(20px);

  animation:goldShine 3s infinite;
  }

   @keyframes goldShine{

  from{
    left:-80%;
  }

  to{
    left:160%;
  }

}

/* BORDA */

@keyframes diamondBorder{

  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:400% 50%;
  }

}

   
.card{

  width:260px;
  position:relative;
  oveflow:hidden;
  backdrop-filter:blur(20px);
}

.card img{

  width:100%;
  height:auto;

  display:block;

  border-radius:20px;
  position:relative;
  oveflow:hidden;
  backdrop-filter:blur(20px);
  

}
   
}
   .electric{

  box-shadow:0 0 20px  purple;

   }
   
 .fire{

  box-shadow:0 0 80px red;
   
   }
   
   /* PARTÍCULAS */

.particles{

  position:absolute;

  inset:0;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,0.5) 1px,
      transparent 2px
    );

  background-size:30px 30px;

  opacity:0.8;

  animation:particlesMove 6s linear infinite;

  pointer-events:none;
  }
   
   /* AURA SUAVE */

.prime::before{

  content:'';

  position:absolute;

  inset:-8px;

  border-radius:25px;

  z-index:-1;

  background:
  linear-gradient(
    45deg,
    rgba(0,195,255,0.25),
    rgba(0,68,255,0.15),
    rgba(125,249,255,0.20)
  );

  filter:blur(20px);

  animation:primeAura 5s linear infinite;
}
   @keyframes particlesMove{

  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(-25px);
  }

   }
    
</style>
  
</head>

<body>
  <!--CARTAS-->

  <div class="card prime">

   <img src="bachira.webp">
    
   
  </div>

  <div class="card prime">

    <img src="bachira_prime.webp">
    
    
  </div>

  <div class="card pro">

    <img src="bachira_gold.webp">
    
     <div class="particles"></div>


  </div>
  
</body>

</html>
